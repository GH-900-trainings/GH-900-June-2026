name: Pipeline

# Single entry point that orchestrates the reusable workflows.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same branch/PR/tag.
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + unit/web app tests + live Azure Maps connectivity
  tests:
    name: Tests
    uses: ./.github/workflows/reusable-tests.yml
    secrets: inherit

  # Security scanning
  codeql:
    name: CodeQL
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/reusable-codeql.yml

  # Build & publish the container image — only after tests + CodeQL pass,
  # and only on main or version tags (never on pull requests).
  publish-docker:
    name: Publish Docker
    needs: [tests, codeql]
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker.yml
    secrets: inherit
